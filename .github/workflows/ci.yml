name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up npm
        env:
          NPM_INTEGRITY: sha512-L5T9i/YAQWQWqTS/xZxJkei/9zcu99hCeE4qi41IyBVV7mRQad3qc2JfuOktwmH+qwGI/V2rbCL+/UYxb1+RQA==
        run: |
          test "$(npm view npm@12.0.1 dist.integrity)" = "$NPM_INTEGRITY"
          npm install --global npm@12.0.1 --ignore-scripts

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend gates
        run: make check-frontend

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
          retention-days: 14

  backend-quality:
    name: Backend quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: gofmt
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$files"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: go build
        run: go build ./cmd/api

      - name: Install pinned govulncheck
        env:
          GOVULNCHECK_VERSION: v1.4.0
        run: |
          # govulncheck is built from a pinned module version via `go install`,
          # which uses the Go module proxy and module-sum integrity rather than
          # a precomputed binary checksum.
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          govulncheck -version

      - name: govulncheck
        run: govulncheck ./...

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: ignore
          retention-days: 14

  migrations:
    name: Migrations
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install pinned Goose
        env:
          GOOSE_VERSION: v3.27.2
        run: |
          go install "github.com/pressly/goose/v3/cmd/goose@${GOOSE_VERSION}"
          goose -version

      - name: Install pinned Supabase CLI
        env:
          SUPABASE_VERSION: 2.109.1
          SUPABASE_SHA256: 36d87b7fe6b4bcfe89ac47a4354e526cff22480224de426d7b370f6934556976
        run: |
          archive="/tmp/supabase.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/supabase/cli/releases/download/v${SUPABASE_VERSION}/supabase_linux_amd64.tar.gz" \
            --output "$archive"
          printf '%s  %s\n' "$SUPABASE_SHA256" "$archive" | sha256sum --check --strict
          mkdir -p /tmp/supabase-bin
          tar -xzf "$archive" -C /tmp/supabase-bin
          echo "/tmp/supabase-bin" >> "$GITHUB_PATH"
          /tmp/supabase-bin/supabase --version

      - name: Start disposable Supabase DB
        run: |
          supabase start --yes \
            --exclude analytics,edge-runtime,functions,imgproxy,inbucket,meta,realtime,rest,storage,studio,vector
          for i in $(seq 1 60); do
            status="$(docker inspect supabase_db_budg --format '{{.State.Health.Status}}' 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          echo "::error::Supabase DB did not become healthy"
          docker logs supabase_db_budg --tail 50
          exit 1

      - name: Bootstrap runtime role
        env:
          BUDG_API_PASSWORD: ci-runtime-password-not-secret
        run: ./backend/scripts/bootstrap-local-db.sh

      - name: Validate migrations
        run: |
          docker exec supabase_db_budg psql -U postgres -d postgres -Atc "select 1" >/dev/null
          GOOSE_DRIVER=postgres \
          GOOSE_DBSTRING="postgresql://postgres:postgres@127.0.0.1:54322/postgres?sslmode=disable" \
          GOOSE_MIGRATION_DIR=./backend/migrations \
          goose -env=none validate

      - name: Apply migrations
        run: |
          GOOSE_DRIVER=postgres \
          GOOSE_DBSTRING="postgresql://postgres:postgres@127.0.0.1:54322/postgres?sslmode=disable" \
          GOOSE_MIGRATION_DIR=./backend/migrations \
          goose -env=none up

      - name: Roll back to zero
        run: |
          GOOSE_DRIVER=postgres \
          GOOSE_DBSTRING="postgresql://postgres:postgres@127.0.0.1:54322/postgres?sslmode=disable" \
          GOOSE_MIGRATION_DIR=./backend/migrations \
          goose -env=none down-to 0

      - name: Reapply migrations
        run: |
          GOOSE_DRIVER=postgres \
          GOOSE_DBSTRING="postgresql://postgres:postgres@127.0.0.1:54322/postgres?sslmode=disable" \
          GOOSE_MIGRATION_DIR=./backend/migrations \
          goose -env=none up

      - name: Tear down Supabase
        if: always()
        run: supabase stop --no-backup || true

  security:
    name: Security
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version

      - name: Set up npm
        env:
          NPM_INTEGRITY: sha512-L5T9i/YAQWQWqTS/xZxJkei/9zcu99hCeE4qi41IyBVV7mRQad3qc2JfuOktwmH+qwGI/V2rbCL+/UYxb1+RQA==
        run: |
          test "$(npm view npm@12.0.1 dist.integrity)" = "$NPM_INTEGRITY"
          npm install --global npm@12.0.1 --ignore-scripts

      - name: Install pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="/tmp/gitleaks_${GITLEAKS_VERSION}.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          printf '%s  %s\n' "$GITLEAKS_SHA256" "$archive" | sha256sum --check --strict
          tar -xzf "$archive" -C /tmp gitleaks
          /tmp/gitleaks version

      - name: Run security gates
        run: make check-security GITLEAKS=/tmp/gitleaks

  ci:
    name: ci
    if: always()
    needs: [frontend-quality, backend-quality, migrations, security]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Require every gate to succeed
        env:
          FRONTEND_RESULT: ${{ needs.frontend-quality.result }}
          BACKEND_RESULT: ${{ needs.backend-quality.result }}
          MIGRATIONS_RESULT: ${{ needs.migrations.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          test "$FRONTEND_RESULT" = success
          test "$BACKEND_RESULT" = success
          test "$MIGRATIONS_RESULT" = success
          test "$SECURITY_RESULT" = success

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up npm
        env:
          NPM_INTEGRITY: sha512-L5T9i/YAQWQWqTS/xZxJkei/9zcu99hCeE4qi41IyBVV7mRQad3qc2JfuOktwmH+qwGI/V2rbCL+/UYxb1+RQA==
        run: |
          test "$(npm view npm@12.0.1 dist.integrity)" = "$NPM_INTEGRITY"
          npm install --global npm@12.0.1 --ignore-scripts

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend gates
        run: make check-frontend

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
          retention-days: 14

  backend-quality:
    name: Backend Phase 0 gate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Reject backend changes before Phase 1
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: ./scripts/check-backend-phase0.sh "$BASE_SHA"

  security:
    name: Security
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version

      - name: Set up npm
        env:
          NPM_INTEGRITY: sha512-L5T9i/YAQWQWqTS/xZxJkei/9zcu99hCeE4qi41IyBVV7mRQad3qc2JfuOktwmH+qwGI/V2rbCL+/UYxb1+RQA==
        run: |
          test "$(npm view npm@12.0.1 dist.integrity)" = "$NPM_INTEGRITY"
          npm install --global npm@12.0.1 --ignore-scripts

      - name: Install pinned Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="/tmp/gitleaks_${GITLEAKS_VERSION}.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          printf '%s  %s\n' "$GITLEAKS_SHA256" "$archive" | sha256sum --check --strict
          tar -xzf "$archive" -C /tmp gitleaks
          /tmp/gitleaks version

      - name: Run security gates
        run: make check-security GITLEAKS=/tmp/gitleaks

  ci:
    name: ci
    if: always()
    needs: [frontend-quality, backend-quality, security]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Require every gate to succeed
        env:
          FRONTEND_RESULT: ${{ needs.frontend-quality.result }}
          BACKEND_RESULT: ${{ needs.backend-quality.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          test "$FRONTEND_RESULT" = success
          test "$BACKEND_RESULT" = success
          test "$SECURITY_RESULT" = success
